# lichess-bot configuration for the NebChess UCI engine.
# Trimmed from upstream config.yml.default (lichess-bot master).
#
# The token is intentionally left BLANK: set the LICHESS_BOT_TOKEN environment
# variable (e.g. a Railway service variable) and lichess-bot will use it,
# overriding this field. Never commit a real token.
token: ""
url: "https://lichess.org/"

engine:
  dir: "./engines"          # directory containing the engine binary
  name: "nebchess"          # binary filename in ./engines
  protocol: "uci"           # NebChess speaks UCI
  ponder: true              # 0.7.0 supports pondering; thinks on the opponent's
                            # clock (keeps one core busy continuously)
  uci_options:
    Hash: 4096              # transposition table MB (engine max). Fine on a 32GB
                            # box; drop to 256 on a small cloud VM.
    Move Overhead: 100      # ms; covers the Lichess network round-trip
    Threads: 1              # NebChess is single-threaded (Lazy SMP is a later milestone)
    BookDepth: 16           # book answers the first 16 plies, then searches
    # --- Data artifacts: place these next to the engine in ./engines, then ---
    # --- uncomment. Fetch with tools/download-book.sh + download-syzygy.sh. ---
    # Use absolute paths if the engine can't resolve these relative ones.
    BookFile: "./engines/nebbook.bin"   # PolyGlot book (~5MB) from the v0.7.0 release
    SyzygyPath: "./engines/tb"          # 3-4-5 Syzygy tables dir (~1GB)

# lichess-bot-side safety margins / timing.
abort_time: 20              # seconds: abort a game if the opponent never moves
rate_limiting_delay: 0
move_overhead: 1000         # ms: extra clock safety on the bot side

challenge:                  # which incoming challenges to auto-accept
  concurrency: 1            # one game at a time (single-threaded engine)
  accept_bot: true          # also accept challenges from other bots
  only_bot: false
  variants:
    - standard              # NebChess plays standard chess only
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  modes:
    - rated                 # rated only: every game calibrates the bot's rating
                            # (add "casual" back to also accept casual challenges)
  min_base: 60              # seconds: avoid hyperbullet the cloud RTT can't serve
  max_base: 1800            # up to 30 min base
  min_increment: 0
  max_increment: 180

matchmaking:                 # the bot seeks out and challenges other bots
  allow_matchmaking: true    # requires the token to also have the challenge:write scope
  challenge_variant: "standard"
  challenge_mode: "rated"    # play rated games so the bot establishes a real rating
  challenge_timeout: 5       # minutes idle before creating a new challenge
  opponent_rating_difference: 300  # only challenge bots within +/- 300 of our rating
  rating_preference: "none"
  # Default spec = 5+3. On each challenge lichess-bot randomly picks either this
  # default or one of the overrides below, so every game is 5+3 or 3+2 -- both in
  # Lichess's blitz pool, giving one rating to calibrate.
  challenge_initial_time:
    - 300                    # 5 min base
  challenge_increment:
    - 3                      # -> 5+3
  overrides:
    blitz_3_2:
      challenge_initial_time:
        - 180                # 3 min base
      challenge_increment:
        - 2                  # -> 3+2

greeting:
  hello: "Hi! I'm NebChess, a from-scratch Rust engine. gl hf!"
  goodbye: "Thanks for the game!"
